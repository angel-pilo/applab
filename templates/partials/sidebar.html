<div id="sidebar"
     class="text-white sidebar-collapsed flex flex-col items-center py-4 sidebar-transition h-screen"
     style="background-color: #0E2238">

  <!-- Botón de menú -->
  <button class="mb-8 cursor-pointer hover:opacity-90 transition-opacity" onclick="toggleSidebar()" aria-label="Alternar menú">
    <i class="fas fa-th-large text-xl"></i>
  </button>

  <!-- Ítems según rol -->
  <nav class="flex flex-col space-y-2 items-center w-full">
    {% set role_items = role_sidebar_items.get(session.get("rol"), []) %}
    {% for item in role_items %}
      <a href="{% if item.url.startswith('app_routes.') %}{{ url_for(item.url) }}{% else %}#{% endif %}"
         class="tooltip flex items-center w-full px-4 py-2 rounded-lg hover:bg-white/10 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-white/40 sidebar-item">
        <i class="fas {{ item.icon }} text-lg"></i>
        <span class="tooltiptext">{{ item.text }}</span>
        <span class="ml-2 hidden sidebar-text text-sm">{{ item.text }}</span>
      </a>
    {% endfor %}
  </nav>

  <!-- Cerrar Sesión -->
  <button class="mt-auto mb-4 tooltip flex items-center w-full px-4 py-2 rounded-lg hover:bg-white/10 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-white/40 sidebar-item"
          onclick="window.location.href='{{ url_for('app_routes.logout') }}'">
    <i class="fas fa-sign-out-alt text-lg"></i>
    <span class="tooltiptext">Cerrar Sesión</span>
    <span class="ml-2 hidden sidebar-text text-sm">Cerrar Sesión</span>
  </button>
</div>
