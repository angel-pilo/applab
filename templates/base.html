<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{% block title %}Dashboard{% endblock %}</title>

  <!-- Config Tailwind CDN (breakpoints personalizados y sin dark mode) -->
  <script>
    tailwind = {
      theme: {
        extend: {
          screens: {
            xs: '480px',
            '3xl': '1600px'
          },
          boxShadow: {
            card: '0 8px 24px -12px rgba(0,0,0,.2)'
          }
        }
      },
      corePlugins: {
        // sin dark mode por ahora
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Iconos -->
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    rel="stylesheet"
  />

  <!-- Tu CSS (después de Tailwind) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="font-sans overflow-x-hidden">
  <!-- Layout principal: sidebar + columna derecha -->
  <div class="min-h-screen flex">
    <!-- Sidebar fija a la izquierda -->
    {% include 'partials/sidebar.html' %}

    <!-- Columna derecha: navbar + contenido + footer (sin flex-col) -->
    <div class="flex-1">
      <!-- Navbar arriba -->
      {% include 'partials/navbar.html' %}

      <!-- Contenido: altura natural, sin flex-1 -->
      <main id="main-content" class="p-4">
        {% block content %}{% endblock %}
      </main>

      <!-- Footer inmediatamente después del contenido -->
      {% include 'partials/footer.html' %}
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
