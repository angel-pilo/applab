<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{% block title %}Dashboard{% endblock %}</title>

  <!-- Config Tailwind CDN (debe declararse ANTES del script de Tailwind) -->
  <script>
    window.tailwind = window.tailwind || {};
    tailwind.config = {
      theme: {
        extend: {
          screens: {
            xs: '480px',
            '3xl': '1600px'
          },
          boxShadow: {
            card: '0 8px 24px -12px rgba(0,0,0,.2)',
          },
        }
      }
      // dark mode off por defecto (no definir darkMode)
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Iconos -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>

  <!-- Tu CSS: después de Tailwind -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>

<body class="font-sans min-h-[100dvh] overflow-x-hidden">
  <div class="flex min-h-[100dvh]">
    {# Sidebar fija a la izquierda #}
    {% include 'partials/sidebar.html' %}

    {# Columna principal #}
    <div class="flex-1 flex flex-col md:pl-16">
      {% include 'partials/navbar.html' %}

      {# main SIN flex-1, así el footer sube y queda pegado al contenido #}
      <main id="main-content"
            class="px-4 sm:px-6 lg:px-8 overflow-x-hidden py-4">
        {% block content %}{% endblock %}
      </main>

      {% include 'partials/footer.html' %}
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
