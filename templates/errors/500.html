{% extends "base.html" %}

{% block title %}Error interno{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center h-full text-center">
  <h1 class="text-6xl font-bold text-red-600 mb-4">500</h1>
  <p class="text-xl text-gray-600 mb-4">
    Ocurrió un error interno en el servidor.
  </p>
  <p class="text-gray-500 mb-6">
    Nuestro equipo de laboratorio ya está revisando el problema. Intenta de nuevo más tarde.
  </p>

  <a href="{{ url_for('app_routes.home') }}"
     class="px-4 py-2 bg-blue-600 text-white rounded shadow hover:bg-blue-700 transition">
    Volver al inicio
  </a>
</div>
{% endblock %}
